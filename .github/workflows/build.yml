name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: ocr-score-rename-macos
          - os: windows-latest
            artifact_name: ocr-score-rename-windows

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tesseract (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install tesseract dylibbundler
          curl -fsSL -o "$(brew --prefix)/share/tessdata/deu.traineddata" \
            https://github.com/tesseract-ocr/tessdata/raw/main/deu.traineddata

      - name: Install Tesseract (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install tesseract --yes
          curl.exe -fsSL -o "C:\Program Files\Tesseract-OCR\tessdata\deu.traineddata" `
            https://github.com/tesseract-ocr/tessdata/raw/main/deu.traineddata

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Bundle Tesseract into project
        run: python scripts/stage_tesseract.py

      - name: Build executable
        run: pyinstaller ocr-score-rename.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/ocr-score-rename/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tesseract
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install package and run tests
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest
